name: CI

# Build, test and static-analysis gate (Section 7.2 of the implementation plan).
# Runs on every push to main and on pull requests. `./gradlew build` compiles all modules,
# runs the unit + property tests and the Testcontainers integration tests (the runner provides
# Docker), and runs Detekt (wired as a finalizer of `assemble`).

on:
  push:
    branches:
      - main
      - develop
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: liberica
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build, test and static analysis
        run: ./gradlew build --no-daemon --stacktrace

      - name: Upload test and Detekt reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            **/build/reports/tests/
            **/build/reports/detekt/
          if-no-files-found: ignore
