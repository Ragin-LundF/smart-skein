name: Release

# Tag-driven release (Section 12.3 of the implementation plan):
# pushing a vX.Y.Z tag builds on JDK 25, runs all tests (Testcontainers uses the runner's Docker),
# publishes signed artifacts to Maven Central (via JReleaser) and to GitHub Packages.
#
# Required repository secrets:
#   GPG_PUBLIC_KEY          base64-encoded ASCII-armored public key  (-> ragin_public.pgp)
#   GPG_SECRET_KEY          base64-encoded ASCII-armored secret key  (-> ragin_secret.pgp)
#   GPG_PASSPHRASE          passphrase for the secret key
#   MAVENCENTRAL_USERNAME   Sonatype Central Portal token username
#   MAVENCENTRAL_PASSWORD   Sonatype Central Portal token password
# GITHUB_TOKEN is provided automatically and is used for GitHub Packages.

on:
  release:
    types: [ published ]
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release without the leading v (e.g. 1.0.0)'
        required: true

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: liberica
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Releasing version ${version}"

      - name: Materialize GPG keys
        run: |
          echo "${{ secrets.GPG_PUBLIC_KEY }}" | base64 --decode > "${GITHUB_WORKSPACE}/ragin_public.pgp"
          echo "${{ secrets.GPG_SECRET_KEY }}" | base64 --decode > "${GITHUB_WORKSPACE}/ragin_secret.pgp"

      - name: Build and test
        run: ./gradlew build -Pversion=${{ steps.version.outputs.version }} --no-daemon --stacktrace

      - name: Publish to staging and GitHub Packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew publish -Pversion=${{ steps.version.outputs.version }} --no-daemon --stacktrace

      - name: Check Maven Central credentials
        id: maven-central-creds
        env:
          MAVENCENTRAL_USERNAME: ${{ secrets.MAVENCENTRAL_USERNAME }}
          MAVENCENTRAL_PASSWORD: ${{ secrets.MAVENCENTRAL_PASSWORD }}
        run: |
          if [ -n "$MAVENCENTRAL_USERNAME" ] && [ -n "$MAVENCENTRAL_PASSWORD" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Secrets MAVENCENTRAL_USERNAME and/or MAVENCENTRAL_PASSWORD are not configured. Skipping Maven Central deployment. Add them under Settings → Secrets and variables → Actions."
          fi

      - name: Deploy to Maven Central (JReleaser)
        if: steps.maven-central-creds.outputs.configured == 'true'
        env:
          JRELEASER_MAVENCENTRAL_SONATYPE_USERNAME: ${{ secrets.MAVENCENTRAL_USERNAME }}
          JRELEASER_MAVENCENTRAL_SONATYPE_PASSWORD: ${{ secrets.MAVENCENTRAL_PASSWORD }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew jreleaserDeploy -Pversion=${{ steps.version.outputs.version }} --no-daemon --stacktrace

      - name: Upload JReleaser logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jreleaser-logs
          path: |
            **/build/jreleaser/trace.log
            **/build/jreleaser/output.properties
          if-no-files-found: ignore
